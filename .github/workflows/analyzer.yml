name: GCC Analyzer
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
    paths:
      - "sources/**"
      - "CMakeLists.txt"
      - "Makefile"
      - "cmake/**"
      - "modules/**"
jobs:
  gcc-analyzer:
    name: gcc-analyzer
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          gcc cmake libssl-dev libpam0g-dev libldap-dev libsystemd-dev
    - name: Build with GCC -fanalyzer
      run: make build_analyzer
